<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <title>User Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/images/favicon.ico">
    <style>
        body {
            margin-top: 15px;
            font-family: Arial, sans-serif;
            background: black url('/images/BgImage.jpg') no-repeat center center;
            background-size: cover;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            position: sticky;
            top: 0;
        }

        .navbar .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .navbar .nav-links a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
        }

        .dashboard {
            min-width:40vw;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            color: #333;
        }

        .dashboard h1 {
            margin-bottom: 20px;
        }

        .form-group {
			min-width: 50%;
            margin: 15px 0;
			display: flex;
			justify-content: space-evenly;
        }

        label {
            display: inline;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
			margin-right: 10px;
            width: 30%;
            padding: 8px;
            border: 1px solid #aaa;
            border-radius: 4px;
            background-color: #f9f9f9;
        }

        input[readonly] {
            background-color: #eee;
            color: #555;
        }

        .edit-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 30px;
            border-radius: 8px;
            width: 400px;
        }

        .close {
            float: right;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
		
		h1{
			color: #333;
		}

    </style>
</head>
<body>

<!-- Navigation Bar -->
<div class="navbar">
    <div class="logo">DeepServer</div>
    <div class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/user/dashboard}">Dashboard</a>
        <a th:href="@{/logout}">Logout</a>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard">
    <h1>User Details</h1>

    <div class="form-group">
        <label>Name:</label>
        <input type="text" th:value="${user.name}" readonly>
    
        <label>State:</label>
        <input type="text" th:value="${user.state}" readonly>
    </div>
	
    <div class="form-group">
        <label>Email:</label>
        <input type="email" th:value="${user.email_id}" readonly>
		
        <label>Phone:</label>
        <input type="text" th:value="${user.phone_no}" readonly>
	</div>
	<div class="form-group">
        <label>Age:</label>
        <input type="number" th:value="${user.age}" readonly>

        <label>Total Matches:</label>
        <input type="number" th:value="${user.totalmatches}" readonly>
    </div>
	
    <div class="form-group">
        <label>Total Kills:</label>
        <input type="number" th:value="${user.totalkills}" readonly>

        <label>Joined Date:</label>
        <input type="text" th:value="${#dates.format(user.joined_date, 'yyyy-MM-dd')}" readonly>
    </div>

    <button class="edit-btn" onclick="openModal()">Edit Details</button>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Edit Your Contact Details</h2>
        <form th:action="@{/user/update}" method="post">
            <input type="hidden" name="name" th:value="${user.name}" />
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email_id" th:value="${user.email_id}" required>
            </div>
            <div class="form-group">
                <label>Phone:</label>
                <input type="text" name="phone_no" th:value="${user.phone_no}" required>
            </div>
			<div class="form-group">
                <label>Age:</label>
                <input type="number" name="age" th:value="${user.age}" required>
            </div>
            <button class="submit-btn" type="submit">Update</button>
        </form>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById("editModal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("editModal").style.display = "none";
    }

    // Close modal when clicking outside the content
    window.onclick = function(event) {
        if (event.target == document.getElementById("editModal")) {
            closeModal();
        }
    }
	
</script>

</body>
</html>
